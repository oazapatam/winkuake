<?xml version="1.0" encoding="UTF-8"?>
<!--
  WinKuake — logo horizontal con wordmark. Para README, headers, etc.
  900x240 con padding generoso. Sobre fondo grafito.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 240" width="900" height="240">
  <defs>
    <linearGradient id="bgH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0E1116"/>
      <stop offset="1" stop-color="#1B2027"/>
    </linearGradient>
    <linearGradient id="accentH" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00C8FF"/>
      <stop offset="1" stop-color="#0099CC"/>
    </linearGradient>
    <filter id="glowH" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="240" fill="url(#bgH)"/>

  <!-- Logo glyph a la izquierda (mismo motif del cuadrado, sin caja) -->
  <g transform="translate(50,50)">
    <rect x="0" y="0" width="140" height="140" rx="26" ry="26"
          fill="#0E1116" stroke="#0099CC" stroke-width="1.5" opacity="0.6"/>
    <g filter="url(#glowH)">
      <polyline points="42,46 78,70 42,94"
                fill="none" stroke="url(#accentH)" stroke-width="13"
                stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <rect x="82" y="86" width="26" height="9" rx="2" ry="2"
          fill="#00C8FF" filter="url(#glowH)"/>
  </g>

  <!-- Wordmark "WinKuake" -->
  <g transform="translate(220,150)" font-family="Segoe UI, Cascadia Code, Consolas, monospace">
    <text font-size="72" font-weight="600" fill="#E8EDF2" letter-spacing="-1">
      Win<tspan fill="#00C8FF">Kuake</tspan>
    </text>
    <text x="6" y="34" font-size="18" font-weight="400" fill="#8A93A0" letter-spacing="3">
      DROP-DOWN TERMINAL FOR WINDOWS
    </text>
  </g>
</svg>
