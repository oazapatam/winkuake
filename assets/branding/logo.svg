<?xml version="1.0" encoding="UTF-8"?>
<!--
  WinKuake — logo principal.
  Paleta: cyan eléctrico (#00C8FF) sobre grafito (#0E1116).
  Motif: caret prompt "❯_" dentro de un cuadrado redondeado.
  Diseñado a 256x256 para escalar bien a 16/32/48/64/128/256.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"   stop-color="#1B2027"/>
      <stop offset="1"   stop-color="#0E1116"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"   stop-color="#00C8FF"/>
      <stop offset="1"   stop-color="#0099CC"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fondo: cuadrado redondeado con borde cyan tenue -->
  <rect x="8" y="8" width="240" height="240" rx="44" ry="44"
        fill="url(#bgGrad)" stroke="#1B2027" stroke-width="2"/>

  <!-- Resaltado superior sutil para profundidad -->
  <rect x="8" y="8" width="240" height="80" rx="44" ry="44"
        fill="#FFFFFF" opacity="0.025"/>

  <!-- Caret ❯ (chevron) a la izquierda -->
  <g filter="url(#glow)">
    <polyline points="78,84 142,128 78,172"
              fill="none" stroke="url(#accentGrad)" stroke-width="22"
              stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Underscore _ del prompt, parpadea en la app pero estático en logo -->
  <rect x="148" y="166" width="44" height="14" rx="3" ry="3"
        fill="#00C8FF" filter="url(#glow)"/>

  <!-- Línea inferior tipo command prompt baseline -->
  <rect x="56" y="200" width="144" height="2" fill="#00C8FF" opacity="0.25"/>
</svg>
